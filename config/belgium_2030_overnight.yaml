# Config for overnight sector-coupled optimisation using a custom pre-made
# atlite cutout with climate-change-adjusted weather data (Belgium, 2030).
# Sector-coupled: power, heating, transport, industry, etc.
#
# The cutout file must be placed at: prepared/belgium_2030_custom.nc

tutorial: true

run:
  name: "belgium-2030-overnight"
  disable_progressbar: true
  shared_resources:
    policy: false

foresight: overnight

scenario:
  clusters:
  - 5
  opts:
  - ''
  sector_opts:
  - ''
  planning_horizons:
  - 2050

countries: ['BE']

snapshots:
  start: "2030-01-01"
  end: "2030-12-31"
  inclusive: both

enable:
  drop_leap_day: false

electricity:
  extendable_carriers:
    Generator: [solar, onwind, OCGT, CCGT, nuclear]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 pipeline]

  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float]

atlite:
  prepared_cutout_dir: "prepared"
  default_cutout: belgium_2030_custom
  cutouts:
    belgium_2030_custom:
      module: era5
      x: [4., 15.]
      y: [46., 56.]
      time: ["2030-01-01", "2030-12-31"]

load:
  fixed_year: 2025

conventional: 
  fixed_year: 2024

renewable:
  offwind-ac:
    max_depth: false
  offwind-dc:
    max_depth: false
  offwind-float:
    max_depth: false
    min_depth: false

energy:
  energy_totals_year: 2023

co2_budget:
  2050: 0.45

biomass:
  share_unsustainable_use_retained:
    2050: 0.66

sector:
  hera_data_year: 2020 # river discharge and ambient temperature for river heat pumps
  seawater_temperature_year: 2020

  gas_network: true
  H2_retrofit: true
  residential_heat:
    dsm:
      enable: true
      direction:
      - overheat
      restriction_value:
        2020: 0.06
        2025: 0.16
        2030: 0.27
      restriction_time:
      - 10
      - 21
  district_heating:
    ptes:
      supplemental_heating:
        enable: true
        booster_heat_pump: true
    ates:
      enable: true
  heat_pump_sources:
    urban central:
    - air
    - geothermal
    - river_water
    - sea_water
    urban decentral:
    - air
    rural:
    - air
    - ground
  hydrogen_turbine: false
  regional_oil_demand: false
  regional_co2_sequestration_potential:
    enable: false
  co2_spatial: false
  co2_network: false
  methanol:
    methanol_to_power:
      ocgt: false
    biomass_to_methanol: false
  ammonia: false
  biomass_spatial: false
  biomass_to_liquid: false
  electrobiofuels: false

  land_transport_electric_share:
    2050: 0.2
  land_transport_ice_share:
    2050: 0.8

  shipping_methanol_share:
    2050: 0.15
  shipping_oil_share:
    2050: 0.85

industry:
  HVC_environment_sequestration_fraction: 0.5
  waste_to_energy: true
  waste_to_energy_cc: true
  St_primary_fraction:
    2050: 0.5
  DRI_fraction:
    2050: 0.05
  Al_primary_fraction:
    2050: 0.35
  HVC_primary_fraction:
    2050: 0.78

clustering:
  temporal:
    resolution_sector: 24h

lines:
  dynamic_line_rating:
    activate: true
    max_line_rating: 1.3

solving:
  solver:
    name: gurobi
    options: gurobi-default
  check_objective:
    enable: false

plotting:
  map:
    boundaries:
  eu_node_location:
    x: -5.5
    y: 46.
  costs_max: 1000
  costs_threshold: 0.0000001
  energy_max:
  energy_min:
  energy_threshold: 0.000001
  interactive_bus_balance:
    bus_name_pattern: "*central heat*"
  enable_heat_source_maps: true
