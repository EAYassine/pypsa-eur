# Config for overnight sector-coupled optimisation using a custom pre-made
# atlite cutout with climate-change-adjusted weather data (Belgium, 2030).
# Sector-coupled: power, heating, transport, industry, etc.
#
# The cutout file must be placed at: prepared/belgium_2030_custom.nc

tutorial: true

run:
  name: "belgium-2030-custom"
  disable_progressbar: true
  shared_resources:
    policy: false

foresight: overnight

scenario:
  clusters:
  - 5
  opts:
  - ''
  sector_opts:
  - ''
  planning_horizons:
  - 2030

countries: ['BE']

snapshots:
  start: "2030-01-01"
  end: "2030-12-31"
  inclusive: both

enable:
  drop_leap_day: false

electricity:
  extendable_carriers:
    Generator: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, nuclear]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 pipeline]

  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float]
  estimate_renewable_capacities:
    enable: true
    from_powerplantmatching: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

atlite:
  prepared_cutout_dir: "prepared"
  default_cutout: belgium_2030_custom
  cutouts:
    belgium_2030_custom:
      module: era5
      x: [4., 15.]
      y: [46., 56.]
      time: ["2030-01-01", "2030-12-31"]

load:
  fixed_year: 2019

renewable:
  offwind-ac:
    max_depth: false
  offwind-dc:
    max_depth: false
  offwind-float:
    max_depth: false
    min_depth: false

sector:
  hera_data_year: 2020

clustering:
  temporal:
    resolution_elec: 24h
    resolution_sector: 24h

lines:
  dynamic_line_rating:
    activate: true
    max_line_rating: 1.3

solving:
  solver:
    name: gurobi
    options: gurobi-default
  check_objective:
    enable: false

